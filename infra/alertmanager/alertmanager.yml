global:
  # Re-send notification every 4h while the alert is still firing.
  repeat_interval: 4h

  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASS}'
  smtp_require_tls: true

route:
  receiver: email-alerts
  group_by: ['alertname', 'location']
  group_wait: 30s
  group_interval: 5m

receivers:
  - name: email-alerts
    email_configs:
      - to: '${ALERT_TO}'
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} — {{ .GroupLabels.location }}'
        body: |
          {{ range .Alerts }}
          Alert:    {{ .Labels.alertname }}
          Location: {{ .Labels.location }}
          Device:   {{ .Labels.device }}
          Status:   {{ .Status }}
          Value:    {{ .Annotations.current_value }}%
          Summary:  {{ .Annotations.summary }}
          Details:  {{ .Annotations.description }}
          Fired at: {{ .StartsAt }}
          {{ if eq .Status "resolved" }}Resolved at: {{ .EndsAt }}{{ end }}
          {{ end }}
